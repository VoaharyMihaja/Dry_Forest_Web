<header class="dashboard-header">
  <div class="header-left">
    <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Basculer la barre latérale">
      <span class="material-icons menu-icon" aria-hidden="true">menu</span>
    </button>

    <!-- Logo image + titre/subtitle (logo remplace le texte "Dry Forest") -->
    <div class="title-block">
      <a href="#" class="logo-link" aria-label="Dry Forest">
        <!-- <img src="assets/images/home-dryforest.png" alt="Dry Forest logo" class="site-logo" /> -->
      </a>
      <div class="title-text">
        <h1 class="sr-only">Dry Forest</h1>
        <p class="subtitle">Suivi des Pépinières et Reforestation</p>
      </div>
    </div>
    
  </div>

  @if (currentUser) {
    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar">
          {{ currentUser.first_name.charAt(0) }}{{ currentUser.last_name.charAt(0) }}
        </div>
        <div class="user-details">
          <span class="user-name">{{ currentUser.first_name }} {{ currentUser.last_name }}</span>
          <span class="user-role">{{ currentUser.role?.name }}</span>
          <span class="user-email">{{ currentUser.email }}</span>
        </div>
      </div>

      <!-- bouton deconnexion: icône seulement -->
      <button class="logout-btn" (click)="logout()" aria-label="Déconnexion">
        <span class="material-icons" aria-hidden="true">logout</span>
      </button>
    </div>
  }
</header>
